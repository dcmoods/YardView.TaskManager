@if (toast$ | async; as toast) {
  <div class="fixed right-4 top-4 z-50">
    <div
      class="min-w-72 max-w-sm rounded-xl border px-4 py-3 shadow-lg transition"
      [ngClass]="{
        'border-green-200 bg-green-50 text-green-800': toast.type === 'success',
        'border-red-200 bg-red-50 text-red-800': toast.type === 'error',
        'border-blue-200 bg-blue-50 text-blue-800': toast.type === 'info'
      }">
      <div class="flex items-start justify-between gap-3">
        <p class="text-sm font-medium">
          {{ toast.message }}
        </p>

        <button
          type="button"
          class="text-xs font-semibold opacity-70 hover:opacity-100"
          (click)="toastService.clear()">
          ✕
        </button>
      </div>
    </div>
  </div>
}
