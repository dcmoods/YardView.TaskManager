<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 px-4">
  <div class="w-full max-w-md rounded-2xl bg-white shadow-xl border border-slate-200">
    <div class="p-6">
      <h2 class="text-lg font-semibold text-slate-900">
        {{ title }}
      </h2>

      <p class="mt-2 text-sm text-slate-600">
        {{ message }}
      </p>

      <div class="mt-6 flex justify-end gap-3">
        <button
          type="button"
          class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 transition"
          (click)="cancelled.emit()"
        >
          {{ cancelText }}
        </button>

        <button
          type="button"
          class="rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 transition"
          (click)="confirmed.emit()"
        >
          {{ confirmText }}
        </button>
      </div>
    </div>
  </div>
</div>
