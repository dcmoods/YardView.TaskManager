<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 px-4">
  <div class="w-full max-w-md rounded-2xl bg-white shadow-xl border border-slate-200">
    <div class="p-6">
      <h2 class="text-lg font-semibold text-slate-900">
        {{ title }}
      </h2>

      <p class="mt-2 text-sm text-slate-600">
        {{ message }}
      </p>

      <div class="mt-6 flex justify-end gap-3">
        <button
          type="button"
          class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 transition"
          (click)="cancelled.emit()"
        >
          {{ cancelText }}
        </button>

        <button
          type="button"
          [disabled]="isLoading"
          class="flex items-center gap-2 rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 transition"
          (click)="confirmed.emit()"
          [class.bg-red-600]="variant === 'danger'"
          [class.hover:bg-red-700]="variant === 'danger'"
          [class.bg-blue-600]="variant === 'primary'"
          [class.hover:bg-blue-700]="variant === 'primary'"
        >
          @if (isLoading) {
            <span class="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"></span>
          }
          {{ confirmText }}
        </button>
      </div>
    </div>
  </div>
</div>
